name: CI

on:
  push:
    branches: [main, master]
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Lint (ESLint)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Install pnpm
        run: npm install -g pnpm@10.33.0
      - name: Install
        run: pnpm install --frozen-lockfile
      - name: Lint apps (only Next.js apps have ESLint configured)
        run: pnpm --filter @trashflow/admin --filter @trashflow/public lint

  js:
    name: Typecheck + build (JS/TS)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install pnpm
        run: npm install -g pnpm@10.33.0

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Typecheck all JS/TS packages
        run: pnpm --filter '!@trashflow/ml' -r typecheck

      - name: Build all JS/TS apps
        run: pnpm --filter '!@trashflow/ml' -r build
        env:
          NEXT_PUBLIC_SUPABASE_URL: https://placeholder.supabase.co
          NEXT_PUBLIC_SUPABASE_ANON_KEY: placeholder-anon-key-for-ci-only
          NEXT_PUBLIC_DEFAULT_COMMUNITY_SLUG: pryluky
          ML_ALLOW_STUB: 'true'
          ML_SERVICE_URL: 'http://localhost:8000'

  vitest:
    name: Vitest unit tests (apps/public)
    runs-on: ubuntu-latest
    timeout-minutes: 5
    needs: js
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Install pnpm
        run: npm install -g pnpm@10.33.0
      - name: Install
        run: pnpm install --frozen-lockfile
      - name: Run vitest (public + admin)
        run: pnpm --filter @trashflow/public --filter @trashflow/admin test

  e2e:
    name: Playwright E2E (apps/public)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: js
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Install pnpm
        run: npm install -g pnpm@10.33.0
      - name: Install deps
        run: pnpm install --frozen-lockfile
      - name: Install Playwright browsers
        run: pnpm --filter @trashflow/public test:e2e:install
      - name: Run E2E (chromium)
        run: pnpm --filter @trashflow/public test:e2e
        env:
          NEXT_PUBLIC_SUPABASE_URL: https://placeholder.supabase.co
          NEXT_PUBLIC_SUPABASE_ANON_KEY: placeholder-anon-key-for-ci-only
      - name: Upload Playwright report on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: apps/public/playwright-report

  python:
    name: Pytest (apps/ml)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    defaults:
      run:
        working-directory: apps/ml
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip

      - name: Install deps (requirements.txt is CI-friendly)
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest httpx

      - name: Run tests (stub mode — no model weights needed)
        run: pytest -ra
        env:
          ML_ALLOW_STUB: 'true'

  lint-sql:
    name: Validate SQL migrations
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4

      - name: Start Postgres with PostGIS
        run: |
          docker run -d --name pg -p 5432:5432 \
            -e POSTGRES_PASSWORD=postgres \
            postgis/postgis:15-3.4

      - name: Wait for Postgres
        run: |
          for i in {1..30}; do
            docker exec pg pg_isready -U postgres && break
            sleep 1
          done

      - name: Bootstrap Supabase-specific schemas we rely on
        run: |
          # Vanilla postgis image doesn't ship the `auth`, `storage` schemas
          # or the `anon`/`authenticated`/`service_role` roles. Stub just
          # enough structure for every migration to apply cleanly.
          docker exec -i pg psql -U postgres <<'SQL'
          -- Supabase roles referenced by RLS policies (`TO authenticated`, etc).
          do $$ begin
            if not exists (select from pg_roles where rolname = 'anon') then
              create role anon;
            end if;
            if not exists (select from pg_roles where rolname = 'authenticated') then
              create role authenticated;
            end if;
            if not exists (select from pg_roles where rolname = 'service_role') then
              create role service_role;
            end if;
          end $$;

          create schema if not exists auth;
          create table if not exists auth.users (
              id uuid primary key default gen_random_uuid()
          );
          -- Supabase Auth helpers referenced by our RLS policies.
          create or replace function auth.uid() returns uuid language sql stable as $fn$
              select null::uuid
          $fn$;
          create or replace function auth.role() returns text language sql stable as $fn$
              select 'anon'::text
          $fn$;
          create or replace function auth.jwt() returns jsonb language sql stable as $fn$
              select '{}'::jsonb
          $fn$;

          create schema if not exists storage;
          create table if not exists storage.buckets (
              id text primary key,
              name text,
              public boolean default false,
              file_size_limit bigint,
              allowed_mime_types text[]
          );
          create table if not exists storage.objects (
              id uuid primary key default gen_random_uuid(),
              bucket_id text references storage.buckets(id)
          );
          SQL

      - name: Apply migrations + seed in logical order
        run: |
          # Data migrations (006 real points, 008 demo complaints) reference
          # the Pryluky community UUID, which is created by seed.sql — so we
          # interleave: DDL first, seed the community + categories, then data.
          apply() {
            local path="$1"
            echo "=== Applying $path ==="
            docker exec -i pg psql -U postgres --set ON_ERROR_STOP=1 < "$path"
          }
          apply supabase/migrations/20260421000001_init.sql
          apply supabase/migrations/20260421000002_rls.sql
          apply supabase/migrations/20260421000003_rpc.sql
          apply supabase/migrations/20260421000004_public_read_points.sql
          apply supabase/migrations/20260421000005_anon_complaints.sql
          apply supabase/migrations/20260421000007_storage_buckets.sql
          apply supabase/seed.sql
          apply supabase/migrations/20260421000006_seed_pryluky_osm.sql
          apply supabase/migrations/20260421000008_demo_complaints.sql
          apply supabase/migrations/20260422000001_tighten_cv_classifications_rls.sql
          apply supabase/migrations/20260422000002_pickup_schedules.sql
          apply supabase/migrations/20260422000003_crews_and_assignment.sql
          apply supabase/migrations/20260422000004_create_collection_point_rpc.sql
          apply supabase/migrations/20260422000005_audit_log.sql
          apply supabase/migrations/20260422000006_update_collection_point_rpc.sql
          apply supabase/migrations/20260427000001_buyback_centres.sql
          apply supabase/migrations/20260427000002_smart_waste_layer.sql
          apply supabase/migrations/20260427000003_routing_rpcs_and_simulator.sql
          apply supabase/migrations/20260427000004_driver_and_resident_rpcs.sql
          apply supabase/migrations/20260428000001_public_trucks_and_complaint_routes.sql
          apply supabase/migrations/20260428000002_marketplace.sql
          apply supabase/migrations/20260428000003_marketplace_photos.sql
          apply supabase/migrations/20260428000004_report_full_bin_rpc.sql
          apply supabase/migrations/20260428000005_fix_points_nearby_overload.sql
          apply supabase/migrations/20260428000006_real_collection_points.sql
          apply supabase/migrations/20260429000001_support_messages.sql
          apply supabase/migrations/20260429000002_demo_data.sql

      - name: Smoke-test RLS scoping (anon must NOT read user data)
        run: |
          # The CI auth.uid() stub returns NULL, so anon SELECTs against tables
          # that RLS gates as 'authenticated' must return zero rows even though
          # we just inserted demo data above.
          assert_anon_sees() {
            local table="$1"
            local expected="$2"
            local label="$3"
            local actual
            actual=$(docker exec -i pg psql -U postgres -At <<SQL
          set role anon;
          select count(*) from public.${table};
          SQL
          )
            echo "anon sees $actual rows in $table (expect $expected) — $label"
            if [ "$actual" != "$expected" ]; then
              echo "::error::RLS regression — $label"
              exit 1
            fi
          }
          assert_anon_sees complaints 0 "anon can read complaints"
          assert_anon_sees profiles   0 "anon can read profiles"
          # Positive controls: pickup_schedules and collection_points are
          # public-read by design, so anon MUST see them.
          rows=$(docker exec -i pg psql -U postgres -At <<'SQL'
          set role anon;
          select count(*) from public.pickup_schedules;
          SQL
          )
          if [ "$rows" -lt "1" ]; then
            echo "::error::pickup_schedules public-read policy is broken (anon sees 0 rows)"
            exit 1
          fi
          rows=$(docker exec -i pg psql -U postgres -At <<'SQL'
          set role anon;
          select count(*) from public.collection_points;
          SQL
          )
          if [ "$rows" -lt "1" ]; then
            echo "::error::collection_points public-read policy is broken (anon sees 0 rows)"
            exit 1
          fi
